<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Question — PySpark Tracker</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #09090b;
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .q-page {
      max-width: 680px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      color: #6b7280;
      font-size: 13px;
      text-decoration: none;
      margin-bottom: 28px;
    }
    .back-link:hover { color: #f4f4f5; }

    .q-header { margin-bottom: 24px; }

    .q-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .q-level-badge {
      font-size: 11px;
      font-weight: 700;
      background: #1f2937;
      color: #9ca3af;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .q-diff {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .q-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .q-concept-tag {
      font-size: 13px;
      color: #6b7280;
    }

    .q-done-row {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 28px;
    }

    .done-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .done-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #6366f1;
      cursor: pointer;
    }

    .q-section {
      margin-bottom: 28px;
    }

    .q-section h2 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .q-section p {
      font-size: 15px;
      line-height: 1.7;
      color: #d1d5db;
    }

    .q-code {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: #a5b4fc;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .q-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1f2937;
      color: #f4f4f5;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 16px;
      border-radius: 8px;
      border: 1px solid #374151;
      transition: background 0.15s;
    }
    .q-link-btn:hover { background: #374151; }

    #content { min-height: 200px; }
  </style>
</head>
<body>
  <div id="content">
    <div style="color:#6b7280;padding:60px 20px;text-align:center">Loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/question.js"></script>
</body>
</html>
