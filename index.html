<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PySpark Tracker</title>
  <!-- in <head>, in this exact order -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #6366f1;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --accent-glow: rgba(99, 102, 241, 0.25);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --bg-card: #111113;
        --bg-card-hover: #16161a;
        --border: rgba(255,255,255,0.07);
        --border-strong: rgba(255,255,255,0.12);
        --text-primary: #f1f1f3;
        --text-secondary: #8b8b9a;
        --text-muted: #55555f;
        --locked-bg: #0e0e10;
        --locked-text: #3a3a42;
        --bar-track: rgba(255,255,255,0.06);
        --shadow-card: 0 1px 3px rgba(0,0,0,0.5);
        --glass-bg: rgba(255,255,255,0.03);
        --glass-border: rgba(255,255,255,0.08);
      }
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f9f9f9;
        --bg-card: #ffffff;
        --bg-card-hover: #f5f5f8;
        --border: rgba(0,0,0,0.07);
        --border-strong: rgba(0,0,0,0.12);
        --text-primary: #111118;
        --text-secondary: #5a5a6a;
        --text-muted: #a0a0b0;
        --locked-bg: #f0f0f3;
        --locked-text: #c0c0cc;
        --bar-track: rgba(0,0,0,0.06);
        --shadow-card: 0 1px 4px rgba(0,0,0,0.08), 0 2px 12px rgba(0,0,0,0.04);
        --glass-bg: rgba(255,255,255,0.45);
        --glass-border: rgba(255,255,255,0.7);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREEN MANAGEMENT ── */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 24px;
    }

    .login-inner {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .login-logo {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .login-logo svg { width: 24px; height: 24px; }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text-primary);
    }

    .login-sub {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .auth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 200ms var(--transition), transform 150ms var(--transition), box-shadow 200ms var(--transition);
      margin-bottom: 10px;
    }

    .auth-btn:hover {
      background: var(--bg-card-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .auth-btn:active { transform: translateY(0); }
    .auth-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .skip-link {
      margin-top: 28px;
      font-size: 12.5px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      transition: color 150ms;
    }
    .skip-link:hover { color: var(--accent); }

    /* ── DASHBOARD ── */
    #dashboard-screen {
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
    }

    .dash-inner {
      width: 100%;
      max-width: 720px;
    }

    /* top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .topbar-brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text-primary);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .topbar-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .back-link {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: color 150ms;
    }
    .back-link:hover { color: var(--accent); }

    /* stat cards */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-card {
      border-radius: var(--radius);
      padding: 20px 22px;
      border: 1px solid var(--border);
    }

    /* frosted glass ONLY on streak card */
    .stat-card.streak {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-color: var(--glass-border);
    }

    .stat-card.progress-card {
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
    }

    .stat-label {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .stat-value-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-icon { flex-shrink: 0; }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-unit {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* section heading */
    .section-heading {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* level cards */
    .levels-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .level-card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform 250ms var(--transition), box-shadow 250ms var(--transition);
    }

    /* COMPLETED */
    .level-card.completed {
      opacity: 0.55;
    }
    .level-card.completed:hover {
      opacity: 0.7;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    /* ACTIVE */
    .level-card.active {
      border-left: 3px solid var(--accent);
      opacity: 1;
      cursor: pointer;
    }
    .level-card.active:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow), var(--shadow-card);
    }

    /* LOCKED */
    .level-card.locked {
      opacity: 0.35;
      background: var(--locked-bg);
      pointer-events: none;
      border-color: transparent;
      box-shadow: none;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      cursor: default;
    }

    .level-card.active .card-header { cursor: pointer; }

    .level-badge {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .level-card.locked .level-badge {
      background: var(--bar-track);
      color: var(--locked-text);
    }

    .level-card.completed .level-badge {
      background: var(--bar-track);
    }

    .card-meta { flex: 1; min-width: 0; }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .check-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      color: var(--accent);
    }

    .lock-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--locked-text);
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar-track {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: var(--bar-track);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      width: 0%;
      transition: width 600ms ease-out;
    }

    .level-card.completed .progress-bar-fill {
      background: var(--text-muted);
    }

    .level-card.locked .progress-bar-fill {
      background: var(--text-muted);
    }

    .progress-label {
      font-size: 11.5px;
      color: var(--text-muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .card-chevron {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 300ms var(--transition);
    }

    .level-card.open .card-chevron {
      transform: rotate(180deg);
    }

    /* EXPANDED QUESTIONS */
    .card-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 350ms var(--transition);
    }

    .level-card.open .card-body {
      grid-template-rows: 1fr;
    }

    .card-body-inner {
      overflow: hidden;
    }

    .questions-list {
      padding: 0 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin: 0 18px;
      margin-bottom: 14px;
    }

    .question-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
    }

    .q-checkbox {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border-strong);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      transition: background 150ms, border-color 150ms;
    }

    .q-checkbox:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .q-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1.5px;
      width: 5px;
      height: 8px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(42deg);
    }

    .q-label {
      font-size: 13.5px;
      color: var(--text-secondary);
      cursor: pointer;
      line-height: 1.4;
      transition: color 200ms, text-decoration 200ms;
    }

    .question-item.done .q-label {
      text-decoration: line-through;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- ── LOGIN SCREEN ── -->

    <div class="login-inner">

      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

  <script>
    // ── SUPABASE ──
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

// ── MOCK USER (until auth is added) ──
const MOCK_USER_ID = 'temp-user-1'

// ── LEVEL METADATA ──
const LEVEL_META = {
  1: { name: 'Core Foundations' },
  2: { name: 'PySpark Basics' },
  3: { name: 'Spark SQL & DataFrames' },
  4: { name: 'Performance Tuning' },
  5: { name: 'Streaming & MLlib' },
}

// ── SCREEN TOGGLE ──
function showDashboard() {
  document.getElementById('login-screen').classList.remove('active')
  document.getElementById('dashboard-screen').classList.add('active')
  loadDashboard()
}

function showLogin() {
  document.getElementById('dashboard-screen').classList.remove('active')
  document.getElementById('login-screen').classList.add('active')
}

document.getElementById('skip-btn').addEventListener('click', showDashboard)
document.getElementById('back-btn').addEventListener('click', showLogin)

// ── LOAD FROM SUPABASE ──
async function loadDashboard() {
  const [questionsRes, progressRes] = await Promise.all([
    db.from('questions').select('*').order('level').order('order_index'),
    db.from('user_progress').select('*').eq('user_id', MOCK_USER_ID)
  ])

  const questions = questionsRes.data || []
  const progress = progressRes.data || []
  const doneIds = new Set(progress.map(p => p.question_id))

  // Group questions by level
  const grouped = {}
  questions.forEach(q => {
    if (!grouped[q.level]) grouped[q.level] = []
    grouped[q.level].push(q)
  })

  // Build LEVELS array
  let foundActive = false
  const LEVELS = [1, 2, 3, 4, 5].map(lvl => {
    const qs = grouped[lvl] || []
    const done = qs.filter(q => doneIds.has(q.id)).length
    const total = qs.length || 30

    let status
    if (done === total && total > 0) {
      status = 'completed'
    } else if (!foundActive) {
      status = 'active'
      foundActive = true
    } else {
      status = 'locked'
    }

    return {
      id: lvl,
      name: LEVEL_META[lvl].name,
      status,
      done,
      total,
      questions: qs
    }
  })

  // Update UI
  const totalDone = LEVELS.reduce((sum, l) => sum + l.done, 0)
  updateCircularProgress(totalDone, 150)
  await updateStreak()
  renderLevels(LEVELS, doneIds)
  setTimeout(animateBars, 80)
}

// ── CIRCULAR PROGRESS ──
function updateCircularProgress(done, total) {
  const circumference = 2 * Math.PI * 36 // radius = 36
  const offset = circumference * (1 - done / total)
  document.getElementById('progress-circle-fill').style.strokeDashoffset = offset
  document.getElementById('progress-done').textContent = done
  document.getElementById('progress-total').textContent = total
}

// ── STREAK ──
async function updateStreak() {
  const { data } = await db
    .from('streaks')
    .select('streak_date')
    .eq('user_id', MOCK_USER_ID)
    .order('streak_date', { ascending: false })

  if (!data || data.length === 0) {
    document.getElementById('streak-count').textContent = '0'
    return
  }

  const dates = new Set(data.map(r => r.streak_date))
  let streak = 0
  const check = new Date()
  check.setHours(0, 0, 0, 0)

  while (true) {
    const key = check.toISOString().split('T')[0]
    if (dates.has(key)) {
      streak++
      check.setDate(check.getDate() - 1)
    } else {
      break
    }
  }

  document.getElementById('streak-count').textContent = streak
}

// ── RENDER LEVELS ──
function renderLevels(LEVELS, doneIds) {
  const container = document.getElementById('levels-list')
  container.innerHTML = ''

  const diffColor = { easy: '#22c55e', medium: '#f59e0b', hard: '#ef4444' }

  LEVELS.forEach((level) => {
    const pct = (level.done / level.total) * 100
    const card = document.createElement('div')
    card.className = `level-card ${level.status}`
    card.dataset.id = level.id

    // Badge
    let badgeContent = `<span style="font-size:11px;font-weight:800">${level.id}</span>`
    if (level.status === 'completed') {
      badgeContent = `<svg viewBox="0 0 16 16" fill="none" style="width:15px;height:15px">
        <path d="M3 8.5l3.5 3.5 6.5-7" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`
    } else if (level.status === 'locked') {
      badgeContent = `<svg viewBox="0 0 16 16" fill="none">
        <rect x="3" y="7" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>`
    }

    // Chevron
    const chevron = level.status === 'active' ? `
      <svg class="card-chevron" viewBox="0 0 16 16" fill="none">
        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>` : ''

    // Questions — now objects from DB
    const questionsHtml = level.questions.map((q) => `
      <label class="question-item ${doneIds.has(q.id) ? 'done' : ''}" data-qid="${q.id}">
        <input type="checkbox" class="q-checkbox" ${doneIds.has(q.id) ? 'checked' : ''} />
        <span class="q-label">
          ${q.title}
          <span style="font-size:10px;color:${diffColor[q.difficulty] || '#888'};margin-left:6px;font-weight:600;text-transform:uppercase">${q.difficulty || ''}</span>
          <span style="font-size:11px;color:#888;display:block;margin-top:2px">${q.concept || ''}</span>
        </span>
      </label>
    `).join('')

    card.innerHTML = `
      <div class="card-header">
        <div class="level-badge">${badgeContent}</div>
        <div class="card-meta">
          <div class="card-title-row">
            <span class="card-title">Level ${level.id} — ${level.name}</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar-track">
              <div class="progress-bar-fill" data-pct="${pct}"></div>
            </div>
            <span class="progress-label">${level.done} / ${level.total}</span>
          </div>
        </div>
        ${chevron}
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          <div class="questions-list">${questionsHtml}</div>
        </div>
      </div>
    `

    // Expand accordion
    if (level.status === 'active') {
      card.querySelector('.card-header').addEventListener('click', () => {
        card.classList.toggle('open')
      })
    }

    // Checkbox → Supabase
    card.querySelectorAll('.question-item').forEach((item) => {
      const cb = item.querySelector('.q-checkbox')
      const qid = parseInt(item.dataset.qid)

      cb.addEventListener('change', async () => {
        item.classList.toggle('done', cb.checked)

        if (cb.checked) {
          await db.from('user_progress').upsert({
            user_id: MOCK_USER_ID,
            question_id: qid,
            completed_at: new Date().toISOString()
          })
          await db.from('streaks').upsert({
            user_id: MOCK_USER_ID,
            streak_date: new Date().toISOString().split('T')[0]
          })
        } else {
          await db.from('user_progress')
            .delete()
            .eq('user_id', MOCK_USER_ID)
            .eq('question_id', qid)
        }

        loadDashboard()
      })
    })

    container.appendChild(card)
  })
}

// ── ANIMATE BARS ──
function animateBars() {
  document.querySelectorAll('.progress-bar-fill').forEach((bar) => {
    requestAnimationFrame(() => {
      bar.style.width = (parseFloat(bar.dataset.pct) || 0) + '%'
    })
  })
}

// ── INIT ──
renderLevels([], new Set())
  </script>
</body>
</html>
