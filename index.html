<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PySpark Tracker</title>
  <script src="js/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #6366f1;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --accent-glow: rgba(99, 102, 241, 0.25);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --bg-card: #111113;
        --bg-card-hover: #16161a;
        --border: rgba(255,255,255,0.07);
        --border-strong: rgba(255,255,255,0.12);
        --text-primary: #f1f1f3;
        --text-secondary: #8b8b9a;
        --text-muted: #55555f;
        --locked-bg: #0e0e10;
        --locked-text: #3a3a42;
        --bar-track: rgba(255,255,255,0.06);
        --shadow-card: 0 1px 3px rgba(0,0,0,0.5);
        --glass-bg: rgba(255,255,255,0.03);
        --glass-border: rgba(255,255,255,0.08);
      }
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f9f9f9;
        --bg-card: #ffffff;
        --bg-card-hover: #f5f5f8;
        --border: rgba(0,0,0,0.07);
        --border-strong: rgba(0,0,0,0.12);
        --text-primary: #111118;
        --text-secondary: #5a5a6a;
        --text-muted: #a0a0b0;
        --locked-bg: #f0f0f3;
        --locked-text: #c0c0cc;
        --bar-track: rgba(0,0,0,0.06);
        --shadow-card: 0 1px 4px rgba(0,0,0,0.08), 0 2px 12px rgba(0,0,0,0.04);
        --glass-bg: rgba(255,255,255,0.45);
        --glass-border: rgba(255,255,255,0.7);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREEN MANAGEMENT ── */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 24px;
    }

    .login-inner {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .login-logo {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .login-logo svg { width: 24px; height: 24px; }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text-primary);
    }

    .login-sub {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .auth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 200ms var(--transition), transform 150ms var(--transition), box-shadow 200ms var(--transition);
      margin-bottom: 10px;
    }

    .auth-btn:hover {
      background: var(--bg-card-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .auth-btn:active { transform: translateY(0); }
    .auth-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .skip-link {
      margin-top: 28px;
      font-size: 12.5px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      transition: color 150ms;
    }
    .skip-link:hover { color: var(--accent); }

    /* ── DASHBOARD ── */
    #dashboard-screen {
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
    }

    .dash-inner {
      width: 100%;
      max-width: 720px;
    }

    /* top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .topbar-brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text-primary);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .topbar-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .back-link {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: color 150ms;
    }
    .back-link:hover { color: var(--accent); }

    /* stat cards */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-card {
      border-radius: var(--radius);
      padding: 20px 22px;
      border: 1px solid var(--border);
    }

    /* frosted glass ONLY on streak card */
    .stat-card.streak {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-color: var(--glass-border);
    }

    .stat-card.progress-card {
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
    }

    .stat-label {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .stat-value-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-icon { flex-shrink: 0; }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-unit {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* section heading */
    .section-heading {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* level cards */
    .levels-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .level-card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform 250ms var(--transition), box-shadow 250ms var(--transition);
    }

    /* COMPLETED */
    .level-card.completed {
      opacity: 0.55;
    }
    .level-card.completed:hover {
      opacity: 0.7;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    /* ACTIVE */
    .level-card.active {
      border-left: 3px solid var(--accent);
      opacity: 1;
      cursor: pointer;
    }
    .level-card.active:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow), var(--shadow-card);
    }

    /* LOCKED */
    .level-card.locked {
      opacity: 0.35;
      background: var(--locked-bg);
      pointer-events: none;
      border-color: transparent;
      box-shadow: none;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      cursor: default;
    }

    .level-card.active .card-header { cursor: pointer; }

    .level-badge {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .level-card.locked .level-badge {
      background: var(--bar-track);
      color: var(--locked-text);
    }

    .level-card.completed .level-badge {
      background: var(--bar-track);
    }

    .card-meta { flex: 1; min-width: 0; }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .check-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      color: var(--accent);
    }

    .lock-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--locked-text);
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar-track {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: var(--bar-track);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      width: 0%;
      transition: width 600ms ease-out;
    }

    .level-card.completed .progress-bar-fill {
      background: var(--text-muted);
    }

    .level-card.locked .progress-bar-fill {
      background: var(--text-muted);
    }

    .progress-label {
      font-size: 11.5px;
      color: var(--text-muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .card-chevron {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 300ms var(--transition);
    }

    .level-card.open .card-chevron {
      transform: rotate(180deg);
    }

    /* EXPANDED QUESTIONS */
    .card-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 350ms var(--transition);
    }

    .level-card.open .card-body {
      grid-template-rows: 1fr;
    }

    .card-body-inner {
      overflow: hidden;
    }

    .questions-list {
      padding: 0 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin: 0 18px;
      margin-bottom: 14px;
    }

    .question-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
    }

    .q-checkbox {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border-strong);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      transition: background 150ms, border-color 150ms;
    }

    .q-checkbox:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .q-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1.5px;
      width: 5px;
      height: 8px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(42deg);
    }

    .q-label {
      font-size: 13.5px;
      color: var(--text-secondary);
      cursor: pointer;
      line-height: 1.4;
      transition: color 200ms, text-decoration 200ms;
    }

    .question-item.done .q-label {
      text-decoration: line-through;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- ── LOGIN SCREEN ── -->
  <div id="login-screen" class="screen active">
    <div class="login-inner">

      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 3L4 14h8l-1 7 9-11h-8l1-10z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="login-title">PySpark Tracker</div>
      <div class="login-sub" style="margin-bottom:28px;">Track your progress, one question at a time.</div>

      <button class="auth-btn" onclick="void 0">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <button class="auth-btn" onclick="void 0">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>

      <a class="skip-link" id="skip-btn">Skip to dashboard →</a>
    </div>
  </div>

  <!-- ── DASHBOARD SCREEN ── -->
  <div id="dashboard-screen" class="screen">
    <div class="dash-inner">

      <div class="topbar">
        <span class="topbar-brand">PySpark Tracker</span>
        <div class="topbar-right">
          <a class="back-link" id="back-btn">← Back to login</a>
          <span class="topbar-name">Kshitiz</span>
          <div class="avatar">K</div>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stats-row">
        <!-- Frosted glass streak card -->
        <div class="stat-card streak">
          <div class="stat-label">Current streak</div>
          <div class="stat-value-row">
            <span class="stat-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C12 2 7 7 7 13a5 5 0 0010 0c0-3-1.5-5-2.5-6.5C14 8 13.5 9 13 10c0 0-1-2-1-8z" fill="#f97316" opacity="0.9"/>
                <path d="M12 10C12 10 9.5 12.5 9.5 15a2.5 2.5 0 005 0c0-1.5-.75-2.5-1.25-3.25C13 13 12.75 13.5 12.5 14c0 0-.5-1-.5-4z" fill="#fbbf24"/>
              </svg>
            </span>
            <div>
              <div class="stat-number">5</div>
              <div class="stat-unit">days</div>
            </div>
          </div>
        </div>

        <!-- Progress card -->
        <div class="stat-card progress-card">
          <div class="stat-label">Total progress</div>
          <div class="stat-value-row">
            <div>
              <div class="stat-number">5 <span style="font-size:16px;font-weight:500;color:var(--text-muted)">/ 150</span></div>
              <div class="stat-unit">questions done</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Level cards -->
      <div class="section-heading">Levels</div>
      <div class="levels-list" id="levels-list"></div>

    </div>
  </div>

  <script>
    // ── DATA ──
    const LEVELS = [
      {
        id: 1,
        name: 'Core Foundations',
        status: 'completed',
        done: 30,
        total: 30,
        questions: [
          'What is Apache Spark and how does it differ from Hadoop MapReduce?',
          'Explain RDDs, DataFrames, and Datasets in Spark.',
          'How does the Spark driver and executor model work?',
          'What is lazy evaluation and why does Spark use it?',
          'Describe the difference between transformations and actions.',
        ]
      },
      {
        id: 2,
        name: 'PySpark Basics',
        status: 'active',
        done: 5,
        total: 30,
        questions: [
          'How do you create a SparkSession in PySpark?',
          'Read a CSV file with schema inference using PySpark.',
          'Explain the difference between select() and withColumn().',
          'How do filter() and where() differ from each other?',
          'What does cache() do and when should you use it?',
        ]
      },
      {
        id: 3,
        name: 'Spark SQL & DataFrames',
        status: 'locked',
        done: 0,
        total: 30,
        questions: [
          'How do you register a DataFrame as a temporary SQL view?',
          'Explain the Catalyst optimizer in Spark SQL.',
          'What are window functions and how are they used?',
          'Describe groupBy() with agg() for multi-column aggregation.',
          'How do you join two DataFrames with different key names?',
        ]
      },
      {
        id: 4,
        name: 'Performance Tuning',
        status: 'locked',
        done: 0,
        total: 30,
        questions: [
          'What is data skew and how do you handle it in Spark?',
          'Explain broadcast joins and when to use them.',
          'What is partitioning and how does repartition() differ from coalesce()?',
          'How do you tune spark.executor.memory and spark.driver.memory?',
          'What is the Tungsten execution engine?',
        ]
      },
      {
        id: 5,
        name: 'Streaming & MLlib',
        status: 'locked',
        done: 0,
        total: 30,
        questions: [
          'How does Spark Structured Streaming differ from DStream-based streaming?',
          'Explain watermarking in Structured Streaming.',
          'What output modes are supported by Structured Streaming?',
          'How do you use MLlib for a classification pipeline?',
          'What is the role of checkpointing in streaming applications?',
        ]
      },
    ];

    // ── SCREEN TOGGLE ──
    let onDashboard = false;

    function showDashboard() {
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('dashboard-screen').classList.add('active');
      onDashboard = true;
      // Trigger progress bar animations after a short paint delay
      setTimeout(animateBars, 80);
    }

    function showLogin() {
      document.getElementById('dashboard-screen').classList.remove('active');
      document.getElementById('login-screen').classList.add('active');
      onDashboard = false;
    }

    document.getElementById('skip-btn').addEventListener('click', showDashboard);
    document.getElementById('back-btn').addEventListener('click', showLogin);

    // ── RENDER LEVELS ──
    function renderLevels() {
      const container = document.getElementById('levels-list');
      container.innerHTML = '';

      LEVELS.forEach((level) => {
        const pct = (level.done / level.total) * 100;

        const card = document.createElement('div');
        card.className = `level-card ${level.status}`;
        card.dataset.id = level.id;

        // Badge content
        let badgeContent = `<span style="font-size:11px;font-weight:800">${level.id}</span>`;
        if (level.status === 'completed') {
          badgeContent = `<svg class="check-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:15px;height:15px">
            <path d="M3 8.5l3.5 3.5 6.5-7" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>`;
        } else if (level.status === 'locked') {
          badgeContent = `<svg class="lock-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="7" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>`;
        }

        // Chevron only for active
        const chevron = level.status === 'active' ? `
          <svg class="card-chevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>` : '';

        // Questions
        const questionsHtml = level.questions.map((q, i) => `
          <label class="question-item" data-idx="${i}">
            <input type="checkbox" class="q-checkbox" />
            <span class="q-label">${q}</span>
          </label>
        `).join('');

        card.innerHTML = `
          <div class="card-header">
            <div class="level-badge">${badgeContent}</div>
            <div class="card-meta">
              <div class="card-title-row">
                <span class="card-title">Level ${level.id} — ${level.name}</span>
              </div>
              <div class="progress-wrap">
                <div class="progress-bar-track">
                  <div class="progress-bar-fill" data-pct="${pct}"></div>
                </div>
                <span class="progress-label">${level.done} / ${level.total}</span>
              </div>
            </div>
            ${chevron}
          </div>
          <div class="card-body">
            <div class="card-body-inner">
              <div class="questions-list">${questionsHtml}</div>
            </div>
          </div>
        `;

        // Toggle expand for active cards
        if (level.status === 'active') {
          card.querySelector('.card-header').addEventListener('click', () => {
            card.classList.toggle('open');
          });
        }

        // Checkbox strike-through
        card.querySelectorAll('.question-item').forEach((item) => {
          const cb = item.querySelector('.q-checkbox');
          cb.addEventListener('change', () => {
            item.classList.toggle('done', cb.checked);
          });
        });

        container.appendChild(card);
      });
    }

    // ── ANIMATE PROGRESS BARS ──
    function animateBars() {
      document.querySelectorAll('.progress-bar-fill').forEach((bar) => {
        const target = parseFloat(bar.dataset.pct) || 0;
        // Small rAF delay ensures transition fires
        requestAnimationFrame(() => {
          bar.style.width = target + '%';
        });
      });
    }

    // ── INIT ──
    renderLevels();
  </script>
</body>
</html>
